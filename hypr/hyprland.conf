#######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################


# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf
source = /home/trzn/.config/hypr/conf.d/my_programs.conf
source = /home/trzn/.config/hypr/conf.d/keybinds.conf
source = /home/trzn/.config/hypr/conf.d/touchscreen.conf
source = /home/trzn/.config/hypr/conf.d/touchpad.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
#exec-once = nm-applet
exec-once = hyprctl dispatch exec "[workspace 2 silent] firefox"
exec-once = waybar & awww-daemon
exec-once = hypridle & hyprlock
exec-once = spotify
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 8

    border_size = 3

    # Samurai theme — light top-left to dark bottom-right
    col.active_border = rgba(B88678ee) rgba(D6B1A5dd) rgba(A99E96cc) rgba(a6a2a0bb) 135deg
    col.inactive_border = rgba(a6a2a088) rgba(12100e55) 135deg

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 2

    # Slight transparency on unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 14
        render_power = 3
        color = rgba(c8584530)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2

        vibrancy = 0.2
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = linear,         0,    0,    1,    1

    # 侍 Samurai curves
    bezier = iaido,          0.05, 0.7,  0.1,  1       # sudden draw — explosive start, clean stop
    bezier = zanshin,        0.22, 1.1,  0.36, 1       # follow-through — slight overshoot, composed settle
    bezier = noto,           0.33, 0,    0.1,  1       # return to stance — measured, grounded
    bezier = kiri,           0,    0.85, 0.15, 1       # the cut itself — near-instant, decisive

    # 斬 Animations
    #           NAME,          ONOFF, SPEED, CURVE,    [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     6,     zanshin
    animation = windows,       1,     5,     iaido
    animation = windowsIn,     1,     3.5,   kiri,     popin 80%
    animation = windowsOut,    1,     2.5,   noto,     popin 70%
    animation = fadeIn,        1,     2.5,   kiri
    animation = fadeOut,       1,     3,     noto
    animation = fade,          1,     3,     iaido
    animation = layers,        1,     3.5,   iaido
    animation = layersIn,      1,     2.5,   kiri,     fade
    animation = layersOut,     1,     2,     noto,     fade
    animation = fadeLayersIn,  1,     2,     kiri
    animation = fadeLayersOut, 1,     2.5,   noto
    animation = workspaces,    1,     3.5,   iaido,    slidefade 30%
    animation = workspacesIn,  1,     3,     kiri,     slidefade 25%
    animation = workspacesOut, 1,     4.5,   noto,     slidefade 60%
    animation = zoomFactor,    1,     5,     zanshin
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
