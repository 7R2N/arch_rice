# ═══════════════════════════════════════════════════════════
# HYPRLOCK — lock screen config
# Place at: ~/.config/hypr/hyprlock.conf
#
# Colors & fonts come from hyprlock-theme.conf,
# regenerated by update-hyprlock-theme.sh on theme switch.
# ═══════════════════════════════════════════════════════════

source = $HOME/.config/hypr/hyprlock-theme.conf

general {
    grace = 5
    hide_cursor = true
    no_fade_in = false
}

# ── Background — blurred current wallpaper ──
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
    vibrancy = 0.1
    noise = 0.02
}

# ── Clock ──
label {
    monitor =
    text = cmd[update:30000] $HOME/.config/hypr/scripts/hyprlock-clock.sh
    color = $fg
    font_size = 72
    font_family = $font
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadow
}

# ── Date ──
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = $muted
    font_size = 16
    font_family = $font
    position = 0, 60
    halign = center
    valign = center
}

# ── Password input ──
input-field {
    monitor =
    size = 280, 44
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent1
    inner_color = $bg
    font_color = $fg
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = $placeholder
    hide_input = false
    rounding = 8
    check_color = $accent2
    fail_color = $accent3
    fail_text = $FAIL
    fail_transition = 200
    position = 0, -20
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = $shadow
}
